<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="24" cy="24" r="22" fill="url(#gradient1)" stroke="url(#gradient2)" stroke-width="2"/>
  
  <!-- AI大脑图标 -->
  <g transform="translate(12, 8)">
    <!-- 大脑轮廓 -->
    <path d="M12 4C15.5 4 18.5 6.5 18.5 10C18.5 11.5 18 12.8 17.2 13.8C18.3 15.2 19 17 19 19C19 23 16 26 12 26C8 26 5 23 5 19C5 17 5.7 15.2 6.8 13.8C6 12.8 5.5 11.5 5.5 10C5.5 6.5 8.5 4 12 4Z" 
          fill="#4A90E2" stroke="#2E5BBA" stroke-width="1.5"/>
    
    <!-- 神经网络连接线 -->
    <g stroke="#E8F4FD" stroke-width="1" opacity="0.8">
      <circle cx="8" cy="12" r="1.5" fill="#E8F4FD"/>
      <circle cx="12" cy="10" r="1.5" fill="#E8F4FD"/>
      <circle cx="16" cy="12" r="1.5" fill="#E8F4FD"/>
      <circle cx="10" cy="16" r="1.5" fill="#E8F4FD"/>
      <circle cx="14" cy="16" r="1.5" fill="#E8F4FD"/>
      
      <line x1="8" y1="12" x2="12" y2="10"/>
      <line x1="12" y1="10" x2="16" y2="12"/>
      <line x1="8" y1="12" x2="10" y2="16"/>
      <line x1="12" y1="10" x2="10" y2="16"/>
      <line x1="16" y1="12" x2="14" y2="16"/>
      <line x1="10" y1="16" x2="14" y2="16"/>
    </g>
  </g>
  
  <!-- 会议桌图标 -->
  <g transform="translate(8, 28)">
    <!-- 会议桌 -->
    <ellipse cx="16" cy="6" rx="14" ry="4" fill="#34C759" opacity="0.9"/>
    <ellipse cx="16" cy="4" rx="14" ry="4" fill="#30D158"/>
    
    <!-- 参会人员 -->
    <g fill="#2E5BBA">
      <circle cx="8" cy="2" r="2"/>
      <circle cx="16" cy="1" r="2"/>
      <circle cx="24" cy="2" r="2"/>
    </g>
  </g>
  
  <!-- 科技光效 -->
  <g opacity="0.6">
    <circle cx="38" cy="12" r="2" fill="#FF9500">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="38" r="1.5" fill="#FF9500">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="42" cy="36" r="1" fill="#5AC8FA">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6F3FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5BBA;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>